# LB-Syo/deploy/docker-compose.prod.yml — un nœud LB (HAProxy + daemon) et
# son sidecar WireGuard, pour CE serveur réel. entrypoint.sh régénère
# config.yaml entièrement depuis les variables d'env ci-dessous à chaque
# démarrage (aucune édition manuelle de fichier requise).
services:
  lb:
    build: ..
    container_name: lb-${SITE}
    restart: always
    network_mode: "service:wireguard"
    environment:
      SITE: "${SITE}"
      ROLE: "${ROLE}"
      ETCD_URL: "${ETCD_URL}"
      DOMAIN: "${DOMAIN}"
      RESOLVER_IP: "${RESOLVER_IP}"
    depends_on:
      - wireguard

  # network_mode: service:wireguard place lb DANS le netns du sidecar
  # wireguard : HAProxy/le daemon héritent directement de wg0 et des routes
  # passerelle installées par celui-ci (WG_GATEWAY_ROUTING), sans avoir à
  # dupliquer la logique de routage côté image lb-syo elle-même.
  wireguard:
    build: ../wireguard
    container_name: lb-${SITE}-wireguard
    restart: always
    cap_add: [NET_ADMIN]
    devices: ["/dev/net/tun"]
    # net.ipv4.ip_forward=1 doit être posé depuis l'extérieur du conteneur
    # (Docker masque /proc/sys/net/ipv4/ip_forward en lecture seule même
    # avec NET_ADMIN) — namespace réseau de CE conteneur uniquement,
    # aucune modification de l'hôte.
    sysctls:
      - net.ipv4.ip_forward=1
    ports:
      - "51820:51820/udp"
    environment:
      SITE: "${SITE}"
      ETCD_URL: "${WG_ETCD_URL}"
      WG_SITE_PREFIX: "${WG_SITE_PREFIX}"
      WG_GATEWAY_ROUTING: "${WG_GATEWAY_ROUTING}"
    networks:
      site_lan:
        ipv4_address: "${WG_GATEWAY_IP}"

# IP statique et prévisible (WG_GATEWAY_IP) : les autres serveurs du même DC
# (storage-lucien, LDAP, Mail) ont besoin de connaître cette adresse pour
# router leur trafic inter-site AVANT que cette passerelle ne soit
# elle-même déployée (generate-config.sh la leur donne en paramètre, pas
# une valeur découverte après coup). `site_lan` doit être le même réseau
# (bridge en test/mono-serveur, macvlan en LAN physique réel — cf.
# storage-lucien/deploy/docker-compose.prod.yml) que celui des autres
# serveurs de ce DC.
networks:
  site_lan:
    external: true
    name: "dc-${SITE}-lan"
