global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket test_etc_haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon
    maxconn 50000

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    timeout connect 5s
    timeout client  1m
    timeout server  1m
    retries 3

# ── Statistiques ─────────────────────────────────────────────────────────
listen stats
    bind *:9000
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats auth admin:securepulse
    stats show-legends
    stats show-node

frontend fe_smtp
    bind *:25
    mode tcp
    default_backend be_smtp

backend be_smtp
    mode tcp
    balance roundrobin
    option tcp-check
    tcp-check connect port 25
    server mail1-securepulse-fr 192.168.1.10:25 check inter 2s fall 3 rise 2
    server mail2-securepulse-fr 192.168.1.11:25 check inter 2s fall 3 rise 2

