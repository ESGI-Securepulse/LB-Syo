global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket test_etc_haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon
    maxconn 50000

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    timeout connect 5s
    timeout client  1m
    timeout server  1m
    retries 3

# ── Résolution DNS dynamique (CoreDNS + etcd) ────────────────────────────
# Les backends (postfix/dovecot) s'enregistrent et se désenregistrent
# eux-mêmes dans etcd au démarrage/arrêt (voir Mail/postfix, Mail/dovecot) ;
# HAProxy les redécouvre automatiquement, sans rechargement de config.
resolvers coredns
    nameserver dns 10.10.0.100:53
    accepted_payload_size 8192
    hold valid 5s
    hold other 10s
    resolve_retries 3
    timeout retry 1s

# ── Statistiques ─────────────────────────────────────────────────────────
listen stats
    bind *:9000
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats auth admin:securepulse
    stats show-legends
    stats show-node

frontend fe_smtp
    bind *:25
    mode tcp
    default_backend be_smtp

backend be_smtp
    mode tcp
    balance roundrobin
    option tcp-check
    tcp-check connect port 25
    server-template postfix-local 1-10 postfix.lyon.securepulse.fr:25 resolvers coredns resolve-prefer ipv4 check inter 5s fall 2 rise 2
    server-template postfix-remote 1-10 postfix.all.securepulse.fr:25 resolvers coredns resolve-prefer ipv4 check inter 5s fall 2 rise 2 backup

