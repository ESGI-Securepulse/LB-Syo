name: lbsyo-test
###############################################################################
# LB-Syo — banc de test autonome (3 nœuds LB : 1 maître désigné + 2 esclaves,
# 2 sites avec backends mail factices, résolution DNS dynamique, WireGuard).
# Port range de test : 15000-20000.
###############################################################################

networks:
  backbone:
    ipam: { config: [{ subnet: 10.62.0.0/24 }] }

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.13
    container_name: lbsyo-test-etcd
    command:
      - etcd
      - --name=etcd0
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-cluster=etcd0=http://etcd:2380
      - --initial-cluster-state=new
    networks:
      backbone: { ipv4_address: 10.62.0.2 }
    ports: ["15380:2379"]
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 5s
      timeout: 5s
      retries: 10

  coredns:
    build: ../../DNS
    container_name: lbsyo-test-coredns
    networks:
      backbone: { ipv4_address: 10.62.0.100 }
    depends_on:
      etcd: { condition: service_healthy }

  postfix-lyon:
    build: ./fake-mail
    container_name: lbsyo-test-postfix-lyon
    hostname: postfix-lyon
    environment:
      ETCD_URL: http://etcd:2379
      SITE: lyon
      SERVICE: postfix
    networks: { backbone: {} }
    dns: 10.62.0.100
    depends_on:
      etcd: { condition: service_healthy }

  dovecot-lyon:
    build: ./fake-mail
    container_name: lbsyo-test-dovecot-lyon
    hostname: dovecot-lyon
    environment:
      ETCD_URL: http://etcd:2379
      SITE: lyon
      SERVICE: dovecot
    networks: { backbone: {} }
    dns: 10.62.0.100
    depends_on:
      etcd: { condition: service_healthy }

  lb-lyon:
    build: ../
    container_name: lbsyo-test-lb-lyon
    hostname: lb-lyon
    environment:
      ETCD_URL: http://etcd:2379
      SITE: lyon
      ROLE: master
      MASTER_DNS: master.securepulse.fr
      RESOLVER_IP: 10.62.0.100
    networks: { backbone: {} }
    dns: 10.62.0.100
    depends_on:
      etcd: { condition: service_healthy }
      coredns: { condition: service_started }
    ports:
      - "15010:9000"   # stats HAProxy lb-lyon

  lb-paris:
    build: ../
    container_name: lbsyo-test-lb-paris
    hostname: lb-paris
    environment:
      ETCD_URL: http://etcd:2379
      SITE: paris
      ROLE: slave
      MASTER_DNS: master.securepulse.fr
      RESOLVER_IP: 10.62.0.100
    networks: { backbone: {} }
    dns: 10.62.0.100
    depends_on:
      etcd: { condition: service_healthy }
      coredns: { condition: service_started }
      lb-lyon: { condition: service_started }
    ports:
      - "15011:9000"

  lb-nice:
    build: ../
    container_name: lbsyo-test-lb-nice
    hostname: lb-nice
    environment:
      ETCD_URL: http://etcd:2379
      SITE: nice
      ROLE: slave
      MASTER_DNS: master.securepulse.fr
      RESOLVER_IP: 10.62.0.100
    networks: { backbone: {} }
    dns: 10.62.0.100
    depends_on:
      etcd: { condition: service_healthy }
      coredns: { condition: service_started }
      lb-lyon: { condition: service_started }
    ports:
      - "15012:9000"
